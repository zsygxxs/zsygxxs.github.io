<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人网站</title>

</head>
<body>
    <div class="container">
        <!-- 头像 -->
        <img src="https://picsum.photos/200/200" alt="头像" class="avatar">

        <p class="bio">一名热爱技术的开发者 | 学习编程 | 分享生活</p>
